databases:
  - name: sustindex-db
    databaseName: sustindex
    user: sustindex
    plan: free

services:
  - type: web
    name: sustindex
    runtime: python
    plan: free
    region: frankfurt
    rootDir: sustindex-
    buildCommand: "bash build.sh"
    startCommand: "gunicorn sustindex.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --log-level debug"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sustindex-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DJANGO_SETTINGS_MODULE
        value: sustindex.settings
      - key: WEB_CONCURRENCY
        value: "2"
      - key: SKIP_AUTO_TRANSLATE
        value: "1"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,sustindex-academia-sustindex.onrender.com"
      # Set FRONTEND_URL and CORS_EXTRA_ORIGINS to your actual Vercel URL.
      # Find it in: Vercel dashboard → Project → Settings → Domains
      - key: FRONTEND_URL
        value: "https://sustindex-academia.vercel.app"
      - key: CORS_EXTRA_ORIGINS
        value: "https://sustindex-academia.vercel.app"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://sustindex-academia.vercel.app,https://sustindex-academia-sustindex.onrender.com"
